<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0520"/>
      <stop offset="40%" stop-color="#1a1145"/>
      <stop offset="70%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#5a4fcf"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#667eea" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#667eea" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f093fb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f093fb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#764ba2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#764ba2" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient center glow -->
  <ellipse cx="600" cy="260" rx="500" ry="300" fill="url(#centerGlow)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Large decorative orbs -->
  <circle cx="140" cy="280" r="260" fill="url(#orb1)"/>
  <circle cx="1060" cy="350" r="300" fill="url(#orb2)"/>

  <!-- Floating contact cards — left side, tilted -->
  <g transform="translate(90, 130) rotate(-12, 80, 70)" opacity="0.6">
    <rect width="160" height="100" rx="12" fill="url(#card2)" opacity="0.4" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="35" cy="35" r="14" stroke="#fff" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M20 65 Q20 50 35 50 Q50 50 50 65" stroke="#fff" stroke-width="2" fill="none" opacity="0.7"/>
    <line x1="70" y1="30" x2="140" y2="30" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="70" y1="45" x2="125" y2="45" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="70" y1="60" x2="135" y2="60" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Floating contact card — right side, tilted opposite -->
  <g transform="translate(950, 100) rotate(10, 80, 70)" opacity="0.5">
    <rect width="160" height="100" rx="12" fill="url(#card3)" opacity="0.35" stroke="#f093fb" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="35" cy="35" r="14" stroke="#fff" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M20 65 Q20 50 35 50 Q50 50 50 65" stroke="#fff" stroke-width="2" fill="none" opacity="0.7"/>
    <line x1="70" y1="30" x2="140" y2="30" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="70" y1="45" x2="120" y2="45" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="70" y1="60" x2="130" y2="60" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Smaller floating card — bottom left -->
  <g transform="translate(180, 420) rotate(6, 60, 45)" opacity="0.35">
    <rect width="120" height="75" rx="10" fill="url(#card1)" opacity="0.4" stroke="#667eea" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="28" cy="28" r="10" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M17 48 Q17 38 28 38 Q39 38 39 48" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
    <line x1="55" y1="24" x2="105" y2="24" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="55" y1="36" x2="95" y2="36" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- Smaller floating card — bottom right -->
  <g transform="translate(900, 440) rotate(-8, 60, 45)" opacity="0.3">
    <rect width="120" height="75" rx="10" fill="url(#card2)" opacity="0.35" stroke="#764ba2" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="28" cy="28" r="10" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M17 48 Q17 38 28 38 Q39 38 39 48" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
    <line x1="55" y1="24" x2="105" y2="24" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="55" y1="36" x2="90" y2="36" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- Connection lines from floating cards to center icon -->
  <g opacity="0.12" stroke="url(#accent)" stroke-width="1" stroke-dasharray="6,4">
    <line x1="250" y1="200" x2="520" y2="180"/>
    <line x1="950" y1="170" x2="680" y2="180"/>
    <line x1="300" y1="460" x2="530" y2="260"/>
    <line x1="900" y1="480" x2="670" y2="260"/>
  </g>

  <!-- Sparkle particles -->
  <g filter="url(#softGlow)">
    <circle cx="350" cy="100" r="2" fill="#667eea" opacity="0.7"/>
    <circle cx="850" cy="80" r="1.5" fill="#f093fb" opacity="0.6"/>
    <circle cx="150" cy="350" r="2" fill="#c084fc" opacity="0.5"/>
    <circle cx="1050" cy="300" r="2.5" fill="#667eea" opacity="0.5"/>
    <circle cx="450" cy="520" r="1.5" fill="#f093fb" opacity="0.4"/>
    <circle cx="750" cy="530" r="2" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="500" cy="70" r="1.5" fill="#c084fc" opacity="0.6"/>
    <circle cx="700" cy="60" r="2" fill="#667eea" opacity="0.5"/>
    <circle cx="1100" cy="200" r="1.5" fill="#f093fb" opacity="0.4"/>
    <circle cx="70" cy="500" r="2" fill="#667eea" opacity="0.35"/>
    <circle cx="1130" cy="450" r="1.5" fill="#c084fc" opacity="0.4"/>
    <circle cx="400" cy="300" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="800" cy="280" r="1" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Central contact icon — larger, with glow -->
  <g transform="translate(510, 60)">
    <!-- Glow behind icon -->
    <rect x="-10" y="-10" width="200" height="200" rx="45" fill="#667eea" opacity="0.15" filter="url(#bigGlow)"/>
    <!-- Icon background -->
    <rect x="0" y="0" width="180" height="180" rx="38" fill="url(#accent)" opacity="0.95"/>
    <!-- Inner subtle border -->
    <rect x="4" y="4" width="172" height="172" rx="34" fill="none" stroke="#fff" stroke-opacity="0.15" stroke-width="1"/>
    <!-- Person silhouette -->
    <circle cx="90" cy="62" r="26" stroke="#fff" stroke-width="6" fill="none"/>
    <path d="M42 130 Q42 95 90 95 Q138 95 138 130" stroke="#fff" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- Data lines under person -->
    <line x1="60" y1="148" x2="120" y2="148" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="72" y1="160" x2="108" y2="160" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Orbiting ring around center icon -->
  <ellipse cx="600" cy="150" rx="130" ry="130" fill="none" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4,8"/>

  <!-- Title -->
  <text x="600" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1" filter="url(#softGlow)">
    Shiny.Maui.ContactStore
  </text>

  <!-- Subtitle -->
  <text x="600" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#a0aec0">
    Device Contact Access That Does It All
  </text>

  <!-- Tags -->
  <g transform="translate(600, 445)" text-anchor="middle">
    <rect x="-280" y="-18" width="130" height="36" rx="18" fill="url(#accent)" opacity="0.3"/>
    <text x="-215" y="6" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#c4b5fd">Cross-Platform</text>

    <rect x="-110" y="-18" width="100" height="36" rx="18" fill="url(#accent)" opacity="0.3"/>
    <text x="-60" y="6" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#c4b5fd">IQueryable</text>

    <rect x="30" y="-18" width="120" height="36" rx="18" fill="url(#accent)" opacity="0.3"/>
    <text x="90" y="6" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#c4b5fd">AOT-Ready</text>

    <rect x="190" y="-18" width="90" height="36" rx="18" fill="url(#accent)" opacity="0.3"/>
    <text x="235" y="6" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#c4b5fd">Full CRUD</text>
  </g>

  <!-- Code snippet decoration -->
  <g transform="translate(100, 530)" opacity="0.18">
    <text font-family="monospace" font-size="14" fill="#667eea">contactStore.Query().Where(c =&gt; c.GivenName.Contains("John"));</text>
  </g>
  <g transform="translate(700, 560)" opacity="0.14">
    <text font-family="monospace" font-size="14" fill="#f093fb">builder.Services.AddContactStore();</text>
  </g>

  <!-- Bottom edge glow -->
  <rect x="300" y="620" width="600" height="10" rx="5" fill="url(#accent)" opacity="0.08" filter="url(#bigGlow)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="accentOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.3" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle glow orbs -->
  <circle cx="300" cy="280" r="180" fill="#8b5cf6" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="900" cy="300" r="200" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="600" cy="400" r="150" fill="#f97316" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Left side: Control icons -->
  <!-- ChatView control -->
  <g transform="translate(60, 120)">
    <rect width="160" height="90" rx="8" fill="url(#cardGrad)" stroke="#475569" stroke-width="1"/>
    <rect width="160" height="24" rx="8" fill="#1e293b"/>
    <rect y="16" width="160" height="8" fill="#1e293b"/>
    <text x="80" y="17" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">ChatView</text>
    <!-- Chat bubbles -->
    <rect x="12" y="34" width="70" height="16" rx="8" fill="#334155"/>
    <text x="47" y="46" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="8">Hello!</text>
    <rect x="78" y="56" width="70" height="16" rx="8" fill="#8b5cf6" opacity="0.3"/>
    <text x="113" y="68" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="8">Hi there</text>
  </g>

  <!-- SecurityPin control -->
  <g transform="translate(60, 240)">
    <rect width="160" height="70" rx="8" fill="url(#cardGrad)" stroke="#475569" stroke-width="1"/>
    <text x="80" y="20" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">SecurityPin</text>
    <!-- Pin dots -->
    <circle cx="40" cy="45" r="8" fill="#22d3ee" opacity="0.8"/>
    <circle cx="65" cy="45" r="8" fill="#22d3ee" opacity="0.8"/>
    <circle cx="90" cy="45" r="8" fill="#22d3ee" opacity="0.8"/>
    <circle cx="115" cy="45" r="8" fill="none" stroke="#475569" stroke-width="1.5"/>
  </g>

  <!-- Slider control -->
  <g transform="translate(60, 340)">
    <rect width="160" height="60" rx="8" fill="url(#cardGrad)" stroke="#475569" stroke-width="1"/>
    <text x="80" y="20" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Slider</text>
    <line x1="20" y1="42" x2="140" y2="42" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="42" x2="90" y2="42" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    <circle cx="90" cy="42" r="7" fill="#34d399"/>
  </g>

  <!-- Button control -->
  <g transform="translate(60, 430)">
    <rect width="160" height="55" rx="8" fill="url(#cardGrad)" stroke="#475569" stroke-width="1"/>
    <text x="80" y="20" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Button</text>
    <rect x="30" y="28" width="100" height="20" rx="4" fill="#8b5cf6" opacity="0.3" stroke="#a78bfa" stroke-width="1"/>
    <text x="80" y="42" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="10">Click me</text>
  </g>

  <!-- Arrows from controls to center service -->
  <g filter="url(#glow)">
    <line x1="230" y1="165" x2="390" y2="260" stroke="url(#arrowGrad)" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <line x1="230" y1="275" x2="390" y2="280" stroke="url(#arrowGrad)" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <line x1="230" y1="370" x2="390" y2="300" stroke="url(#arrowGrad)" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <line x1="230" y1="458" x2="390" y2="310" stroke="url(#arrowGrad)" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  </g>

  <!-- Center: IFeedbackService hub -->
  <g transform="translate(400, 180)">
    <rect width="320" height="220" rx="12" fill="#0f172a" stroke="#8b5cf6" stroke-width="2" opacity="0.9" filter="url(#glow)"/>
    <!-- Title bar -->
    <rect width="320" height="32" rx="12" fill="#1e293b"/>
    <rect y="24" width="320" height="8" fill="#1e293b"/>
    <circle cx="18" cy="16" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="36" cy="16" r="5" fill="#eab308" opacity="0.7"/>
    <circle cx="54" cy="16" r="5" fill="#22c55e" opacity="0.7"/>
    <text x="160" y="20" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="11" font-weight="bold">IFeedbackService</text>

    <!-- Interface code -->
    <text x="16" y="58" fill="#c084fc" font-family="monospace" font-size="11">public interface</text>
    <text x="16" y="76" fill="#22d3ee" font-family="monospace" font-size="12" font-weight="bold">  IFeedbackService</text>
    <text x="16" y="94" fill="#94a3b8" font-family="monospace" font-size="11">{</text>
    <text x="28" y="114" fill="#c084fc" font-family="monospace" font-size="11">void</text>
    <text x="60" y="114" fill="#34d399" font-family="monospace" font-size="11">OnRequested</text>
    <text x="152" y="114" fill="#94a3b8" font-family="monospace" font-size="11">(</text>
    <text x="40" y="134" fill="#c084fc" font-family="monospace" font-size="11">object</text>
    <text x="92" y="134" fill="#fbbf24" font-family="monospace" font-size="11">control</text>
    <text x="152" y="134" fill="#94a3b8" font-family="monospace" font-size="11">,</text>
    <text x="40" y="154" fill="#c084fc" font-family="monospace" font-size="11">string</text>
    <text x="92" y="154" fill="#fbbf24" font-family="monospace" font-size="11">eventName</text>
    <text x="166" y="154" fill="#94a3b8" font-family="monospace" font-size="11">,</text>
    <text x="40" y="174" fill="#c084fc" font-family="monospace" font-size="11">object?</text>
    <text x="100" y="174" fill="#fbbf24" font-family="monospace" font-size="11">args</text>
    <text x="16" y="194" fill="#94a3b8" font-family="monospace" font-size="11">  );</text>
    <text x="16" y="210" fill="#94a3b8" font-family="monospace" font-size="11">}</text>
  </g>

  <!-- Arrows from service to output types -->
  <g filter="url(#glow)">
    <line x1="730" y1="250" x2="830" y2="170" stroke="url(#accentCyan)" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <line x1="730" y1="280" x2="830" y2="270" stroke="url(#accentGreen)" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <line x1="730" y1="310" x2="830" y2="370" stroke="url(#accentOrange)" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <line x1="730" y1="340" x2="830" y2="450" stroke="url(#accentPurple)" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  </g>

  <!-- Right side: Output types -->
  <!-- Haptic -->
  <g transform="translate(840, 130)">
    <rect width="180" height="60" rx="8" fill="url(#cardGrad)" stroke="#06b6d4" stroke-width="1.5"/>
    <!-- Vibration icon -->
    <path d="M 24 20 Q 18 30 24 40" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <path d="M 18 16 Q 10 30 18 44" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
    <rect x="28" y="22" width="14" height="16" rx="3" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <path d="M 46 20 Q 52 30 46 40" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <path d="M 52 16 Q 60 30 52 44" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
    <text x="110" y="28" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="13" font-weight="bold">Haptic</text>
    <text x="110" y="46" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Click / LongPress</text>
  </g>

  <!-- Text-to-Speech -->
  <g transform="translate(840, 230)">
    <rect width="180" height="60" rx="8" fill="url(#cardGrad)" stroke="#10b981" stroke-width="1.5"/>
    <!-- Speaker icon -->
    <polygon points="20,24 30,20 30,44 20,40" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <path d="M 34 24 Q 42 32 34 40" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <path d="M 38 18 Q 50 32 38 46" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
    <text x="120" y="28" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="13" font-weight="bold">TTS</text>
    <text x="120" y="46" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">SpeakAsync()</text>
  </g>

  <!-- Sound Effects -->
  <g transform="translate(840, 330)">
    <rect width="180" height="60" rx="8" fill="url(#cardGrad)" stroke="#f97316" stroke-width="1.5"/>
    <!-- Music note icon -->
    <circle cx="28" cy="38" r="6" fill="none" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="34" y1="38" x2="34" y2="18" stroke="#fb923c" stroke-width="1.5"/>
    <path d="M 34 18 Q 44 16 42 22" fill="none" stroke="#fb923c" stroke-width="1.5"/>
    <text x="120" y="28" text-anchor="middle" fill="#fb923c" font-family="monospace" font-size="13" font-weight="bold">Audio</text>
    <text x="120" y="46" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Sound Effects</text>
  </g>

  <!-- Analytics -->
  <g transform="translate(840, 430)">
    <rect width="180" height="60" rx="8" fill="url(#cardGrad)" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- Chart icon -->
    <rect x="18" y="38" width="8" height="14" rx="1" fill="#a78bfa" opacity="0.6"/>
    <rect x="30" y="28" width="8" height="24" rx="1" fill="#a78bfa" opacity="0.8"/>
    <rect x="42" y="20" width="8" height="32" rx="1" fill="#a78bfa"/>
    <text x="120" y="28" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="13" font-weight="bold">Analytics</text>
    <text x="120" y="46" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Telemetry</text>
  </g>

  <!-- Title -->
  <text x="600" y="555" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="28" font-weight="bold" filter="url(#glow)">IFeedbackService</text>
  <text x="600" y="585" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="14">One Hook to Rule Them All</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3">
    <animate attributeName="fill" values="#8b5cf6;#06b6d4;#f97316;#8b5cf6" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
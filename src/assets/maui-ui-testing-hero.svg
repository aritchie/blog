<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#512BD4"/>
      <stop offset="100%" stop-color="#7b4ff5"/>
    </linearGradient>
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00cc66"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#512BD4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#512BD4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00cc66" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00cc66" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#512BD4" stroke-width="0.3" opacity="0.06">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="130" x2="1200" y2="130"/>
    <line x1="0" y1="260" x2="1200" y2="260"/>
    <line x1="0" y1="390" x2="1200" y2="390"/>
    <line x1="0" y1="520" x2="1200" y2="520"/>
  </g>

  <!-- Background glows -->
  <ellipse cx="300" cy="280" rx="250" ry="220" fill="url(#glow)"/>
  <ellipse cx="900" cy="300" rx="250" ry="220" fill="url(#greenGlow)"/>

  <!-- ===== LEFT: MOBILE PHONE ===== -->
  <g transform="translate(140, 100)">
    <!-- Phone body -->
    <rect x="0" y="0" width="180" height="340" rx="20" fill="url(#phoneGrad)" stroke="#30363d" stroke-width="2"/>
    <!-- Screen -->
    <rect x="10" y="30" width="160" height="280" rx="4" fill="#0d1117"/>
    <!-- Notch -->
    <rect x="55" y="4" width="70" height="16" rx="8" fill="#0d1117"/>

    <!-- App content - ride list mockup -->
    <!-- Header bar -->
    <rect x="10" y="30" width="160" height="32" rx="4" fill="#161b22"/>
    <text x="90" y="52" text-anchor="middle" fill="#e6edf3" font-family="system-ui" font-size="10" font-weight="bold">ShinyWonderland</text>

    <!-- List items (rides) -->
    <rect x="16" y="70" width="148" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
    <circle cx="30" cy="85" r="5" fill="#00cc66" opacity="0.8"/>
    <text x="42" y="82" fill="#e6edf3" font-family="system-ui" font-size="8">Leviathan</text>
    <text x="42" y="92" fill="#8b949e" font-family="system-ui" font-size="7">15 min</text>
    <text x="152" y="88" text-anchor="end" fill="#00cc66" font-family="monospace" font-size="8">OPEN</text>

    <rect x="16" y="104" width="148" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
    <circle cx="30" cy="119" r="5" fill="#ffaa00" opacity="0.8"/>
    <text x="42" y="116" fill="#e6edf3" font-family="system-ui" font-size="8">Yukon Striker</text>
    <text x="42" y="126" fill="#8b949e" font-family="system-ui" font-size="7">45 min</text>
    <text x="152" y="122" text-anchor="end" fill="#ffaa00" font-family="monospace" font-size="8">BUSY</text>

    <rect x="16" y="138" width="148" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
    <circle cx="30" cy="153" r="5" fill="#00cc66" opacity="0.8"/>
    <text x="42" y="150" fill="#e6edf3" font-family="system-ui" font-size="8">Behemoth</text>
    <text x="42" y="160" fill="#8b949e" font-family="system-ui" font-size="7">20 min</text>
    <text x="152" y="156" text-anchor="end" fill="#00cc66" font-family="monospace" font-size="8">OPEN</text>

    <rect x="16" y="172" width="148" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
    <circle cx="30" cy="187" r="5" fill="#ff4444" opacity="0.8"/>
    <text x="42" y="184" fill="#e6edf3" font-family="system-ui" font-size="8">Wonder Mountain</text>
    <text x="42" y="194" fill="#8b949e" font-family="system-ui" font-size="7">Closed</text>
    <text x="152" y="190" text-anchor="end" fill="#ff4444" font-family="monospace" font-size="8">DOWN</text>

    <rect x="16" y="206" width="148" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
    <circle cx="30" cy="221" r="5" fill="#00cc66" opacity="0.8"/>
    <text x="42" y="218" fill="#e6edf3" font-family="system-ui" font-size="8">Wilde Beast</text>
    <text x="42" y="228" fill="#8b949e" font-family="system-ui" font-size="7">10 min</text>
    <text x="152" y="224" text-anchor="end" fill="#00cc66" font-family="monospace" font-size="8">OPEN</text>

    <!-- Tab bar -->
    <rect x="10" y="275" width="160" height="35" rx="4" fill="#161b22"/>
    <text x="35" y="296" text-anchor="middle" fill="#512BD4" font-family="system-ui" font-size="7" font-weight="bold">Rides</text>
    <text x="70" y="296" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="7">Map</text>
    <text x="105" y="296" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="7">Settings</text>
    <text x="145" y="296" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="7">Hours</text>

    <!-- AutomationId callouts -->
    <g opacity="0.9">
      <!-- Pointer to ride list -->
      <line x1="170" y1="85" x2="200" y2="75" stroke="#7b4ff5" stroke-width="1" stroke-dasharray="3,2"/>
      <rect x="200" y="65" width="90" height="18" rx="4" fill="#512BD4" fill-opacity="0.2" stroke="#7b4ff5" stroke-width="1"/>
      <text x="245" y="78" text-anchor="middle" fill="#7b4ff5" font-family="monospace" font-size="7">AutomationId</text>

      <!-- Pointer to tab -->
      <line x1="170" y1="294" x2="200" y2="300" stroke="#7b4ff5" stroke-width="1" stroke-dasharray="3,2"/>
      <rect x="200" y="290" width="80" height="18" rx="4" fill="#512BD4" fill-opacity="0.2" stroke="#7b4ff5" stroke-width="1"/>
      <text x="240" y="303" text-anchor="middle" fill="#7b4ff5" font-family="monospace" font-size="7">SettingsTab</text>
    </g>
  </g>

  <!-- ===== CONNECTION: Phone to Terminal ===== -->
  <g opacity="0.4">
    <path d="M380,280 C440,280 460,260 500,260" stroke="#00cc66" stroke-width="2" fill="none" stroke-dasharray="6,4"/>
    <path d="M380,300 C440,300 460,300 500,300" stroke="#00cc66" stroke-width="2" fill="none" stroke-dasharray="6,4"/>
    <path d="M380,320 C440,320 460,340 500,340" stroke="#00cc66" stroke-width="2" fill="none" stroke-dasharray="6,4"/>
  </g>
  <!-- Agent label on connection -->
  <rect x="400" y="276" width="80" height="18" rx="9" fill="#00cc66" fill-opacity="0.15" stroke="#00cc66" stroke-width="1"/>
  <text x="440" y="289" text-anchor="middle" fill="#00cc66" font-family="monospace" font-size="8" font-weight="bold">HTTP Agent</text>

  <!-- ===== CENTER: TERMINAL WINDOW ===== -->
  <g transform="translate(500, 80)">
    <!-- Terminal frame -->
    <rect x="0" y="0" width="380" height="360" rx="12" fill="url(#termGrad)" stroke="#30363d" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="380" height="28" rx="12" fill="#252535"/>
    <rect x="0" y="16" width="380" height="12" fill="#252535"/>
    <!-- Window buttons -->
    <circle cx="18" cy="14" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="14" r="5" fill="#febc2e"/>
    <circle cx="54" cy="14" r="5" fill="#28c840"/>
    <text x="190" y="18" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">maui-devflow CLI</text>

    <!-- Terminal content -->
    <text x="14" y="52" fill="#00cc66" font-family="monospace" font-size="10">$</text>
    <text x="28" y="52" fill="#e6edf3" font-family="monospace" font-size="10"> maui-devflow MAUI tree</text>

    <text x="14" y="72" fill="#8b949e" font-family="monospace" font-size="9">  RideTimesPage</text>
    <text x="14" y="86" fill="#8b949e" font-family="monospace" font-size="9">    CollectionView [RidesList]</text>
    <text x="14" y="100" fill="#8b949e" font-family="monospace" font-size="9">    Label [TimestampLabel]</text>
    <text x="14" y="114" fill="#8b949e" font-family="monospace" font-size="9">    ToolbarItem [HistoryBtn]</text>

    <text x="14" y="140" fill="#00cc66" font-family="monospace" font-size="10">$</text>
    <text x="28" y="140" fill="#e6edf3" font-family="monospace" font-size="10"> maui-devflow MAUI tap \</text>
    <text x="28" y="154" fill="#e6edf3" font-family="monospace" font-size="10">    --automationId "LoginBtn"</text>

    <text x="14" y="174" fill="#00cc66" font-family="monospace" font-size="9">  OK - Element tapped</text>

    <text x="14" y="200" fill="#00cc66" font-family="monospace" font-size="10">$</text>
    <text x="28" y="200" fill="#e6edf3" font-family="monospace" font-size="10"> maui-devflow MAUI assert \</text>
    <text x="28" y="214" fill="#e6edf3" font-family="monospace" font-size="10">    --automationId "CounterLabel" \</text>
    <text x="28" y="228" fill="#e6edf3" font-family="monospace" font-size="10">    Text "5"</text>

    <text x="14" y="248" fill="#00cc66" font-family="monospace" font-size="9">  PASS - Text matches "5"</text>

    <text x="14" y="274" fill="#00cc66" font-family="monospace" font-size="10">$</text>
    <text x="28" y="274" fill="#e6edf3" font-family="monospace" font-size="10"> dotnet test UITests/</text>

    <text x="14" y="298" fill="#e6edf3" font-family="monospace" font-size="9">  Passed!  48 tests</text>
    <text x="14" y="312" fill="#00cc66" font-family="monospace" font-size="9">  Duration: 1m 23s</text>

    <!-- Blinking cursor -->
    <rect x="14" y="330" width="7" height="13" fill="#00cc66" opacity="0.8"/>
  </g>

  <!-- ===== RIGHT: TEST RESULTS ===== -->
  <g transform="translate(920, 100)">
    <!-- Test result cards -->
    <rect x="0" y="0" width="220" height="32" rx="6" fill="#161b22" stroke="#00cc66" stroke-width="1"/>
    <text x="12" y="20" fill="#00cc66" font-family="monospace" font-size="10" font-weight="bold">PASS</text>
    <text x="52" y="20" fill="#e6edf3" font-family="system-ui" font-size="9">NavigationTests (7)</text>

    <rect x="0" y="40" width="220" height="32" rx="6" fill="#161b22" stroke="#00cc66" stroke-width="1"/>
    <text x="12" y="60" fill="#00cc66" font-family="monospace" font-size="10" font-weight="bold">PASS</text>
    <text x="52" y="60" fill="#e6edf3" font-family="system-ui" font-size="9">SettingsPageTests (13)</text>

    <rect x="0" y="80" width="220" height="32" rx="6" fill="#161b22" stroke="#00cc66" stroke-width="1"/>
    <text x="12" y="100" fill="#00cc66" font-family="monospace" font-size="10" font-weight="bold">PASS</text>
    <text x="52" y="100" fill="#e6edf3" font-family="system-ui" font-size="9">RideTimesPageTests (7)</text>

    <rect x="0" y="120" width="220" height="32" rx="6" fill="#161b22" stroke="#00cc66" stroke-width="1"/>
    <text x="12" y="140" fill="#00cc66" font-family="monospace" font-size="10" font-weight="bold">PASS</text>
    <text x="52" y="140" fill="#e6edf3" font-family="system-ui" font-size="9">ParkingPageTests (5)</text>

    <rect x="0" y="160" width="220" height="32" rx="6" fill="#161b22" stroke="#00cc66" stroke-width="1"/>
    <text x="12" y="180" fill="#00cc66" font-family="monospace" font-size="10" font-weight="bold">PASS</text>
    <text x="52" y="180" fill="#e6edf3" font-family="system-ui" font-size="9">MealTimePageTests (5)</text>

    <rect x="0" y="200" width="220" height="32" rx="6" fill="#161b22" stroke="#00cc66" stroke-width="1"/>
    <text x="12" y="220" fill="#00cc66" font-family="monospace" font-size="10" font-weight="bold">PASS</text>
    <text x="52" y="220" fill="#e6edf3" font-family="system-ui" font-size="9">HoursPageTests (3)</text>

    <!-- Total badge -->
    <rect x="30" y="250" width="160" height="40" rx="20" fill="#00cc66" fill-opacity="0.15" stroke="#00cc66" stroke-width="1.5"/>
    <text x="110" y="275" text-anchor="middle" fill="#00cc66" font-family="system-ui" font-size="16" font-weight="bold">48 / 48 PASS</text>
  </g>

  <!-- ===== TITLE ===== -->
  <text x="600" y="520" text-anchor="middle" fill="#e6edf3" font-family="system-ui" font-size="36" font-weight="bold">UI Testing for .NET MAUI</text>
  <text x="600" y="560" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="18">MauiDevFlow + AI-Generated Tests</text>

  <!-- Bottom pills -->
  <g font-family="system-ui" font-size="11" text-anchor="middle">
    <rect x="280" y="580" width="100" height="26" rx="13" fill="none" stroke="#512BD4" stroke-width="1" opacity="0.6"/>
    <text x="330" y="597" fill="#7b4ff5" opacity="0.9">No Appium</text>

    <rect x="400" y="580" width="90" height="26" rx="13" fill="none" stroke="#00cc66" stroke-width="1" opacity="0.6"/>
    <text x="445" y="597" fill="#00cc66" opacity="0.9">In-Process</text>

    <rect x="510" y="580" width="70" height="26" rx="13" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.6"/>
    <text x="545" y="597" fill="#00ccff" opacity="0.9">CLI</text>

    <rect x="600" y="580" width="100" height="26" rx="13" fill="none" stroke="#9966ff" stroke-width="1" opacity="0.6"/>
    <text x="650" y="597" fill="#9966ff" opacity="0.9">AI-Assisted</text>

    <rect x="720" y="580" width="90" height="26" rx="13" fill="none" stroke="#00cc66" stroke-width="1" opacity="0.6"/>
    <text x="765" y="597" fill="#00cc66" opacity="0.9">48 Tests</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="50" cy="80" r="3" fill="#512BD4" opacity="0.4"/>
  <circle cx="75" cy="60" r="2" fill="#00cc66" opacity="0.3"/>
  <circle cx="40" cy="550" r="2" fill="#533483" opacity="0.3"/>
  <circle cx="1160" cy="550" r="2" fill="#00cc66" opacity="0.3"/>
  <circle cx="1150" cy="60" r="2" fill="#7b4ff5" opacity="0.3"/>
</svg>
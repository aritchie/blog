<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="accentOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="auraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="40%" stop-color="#06b6d4"/>
      <stop offset="70%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.3" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle glow orbs -->
  <circle cx="350" cy="280" r="200" fill="#8b5cf6" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="850" cy="300" r="180" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="600" cy="350" r="160" fill="#10b981" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Central Aura orb -->
  <circle cx="600" cy="260" r="90" fill="#8b5cf6" opacity="0.08" filter="url(#bigGlow)">
    <animate attributeName="r" values="85;95;85" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="260" r="65" fill="#06b6d4" opacity="0.1" filter="url(#bigGlow)">
    <animate attributeName="r" values="60;70;60" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="260" r="40" fill="none" stroke="url(#auraGrad)" stroke-width="2.5" opacity="0.6" filter="url(#glow)">
    <animate attributeName="r" values="38;45;38" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="260" r="18" fill="#8b5cf6" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Sound waves emanating from orb -->
  <path d="M 555 230 Q 540 260 555 290" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 545 218 Q 525 260 545 302" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.05;0.25" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 645 230 Q 660 260 645 290" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 655 218 Q 675 260 655 302" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.05;0.25" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Left: Text Chat card -->
  <g transform="translate(80, 140)">
    <rect width="190" height="110" rx="10" fill="url(#cardGrad)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="95" y="22" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="11" font-weight="bold">Text Chat</text>
    <!-- Chat bubbles -->
    <rect x="12" y="36" width="100" height="20" rx="10" fill="#334155"/>
    <text x="62" y="50" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">What is MAUI?</text>
    <rect x="60" y="62" width="118" height="20" rx="10" fill="#8b5cf6" opacity="0.3"/>
    <text x="119" y="76" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="9">A UI framework...</text>
    <rect x="12" y="86" width="80" height="14" rx="7" fill="#334155" opacity="0.5"/>
    <rect x="16" y="90" width="30" height="6" rx="3" fill="#475569" opacity="0.6">
      <animate attributeName="width" values="20;50;20" dur="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Left: Voice Chat card -->
  <g transform="translate(80, 340)">
    <rect width="190" height="90" rx="10" fill="url(#cardGrad)" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="95" y="22" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="11" font-weight="bold">Voice Chat</text>
    <!-- Microphone icon -->
    <rect x="78" y="36" width="16" height="24" rx="8" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <path d="M 70 54 Q 70 68 86 68 Q 102 68 102 54" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="86" y1="68" x2="86" y2="76" stroke="#22d3ee" stroke-width="1.5"/>
    <!-- Sound bars -->
    <rect x="110" y="44" width="4" height="12" rx="2" fill="#22d3ee" opacity="0.6">
      <animate attributeName="height" values="8;18;8" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="118" y="40" width="4" height="20" rx="2" fill="#22d3ee" opacity="0.5">
      <animate attributeName="height" values="14;6;14" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="126" y="42" width="4" height="16" rx="2" fill="#22d3ee" opacity="0.4">
      <animate attributeName="height" values="10;20;10" dur="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Right: Wake Word card -->
  <g transform="translate(930, 140)">
    <rect width="190" height="110" rx="10" fill="url(#cardGrad)" stroke="#10b981" stroke-width="1.5"/>
    <text x="95" y="22" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="11" font-weight="bold">Wake Word</text>
    <text x="95" y="52" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="20">"</text>
    <text x="95" y="70" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="13">Hey Copilot</text>
    <text x="95" y="88" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="20">"</text>
    <!-- Listening indicator -->
    <circle cx="95" cy="100" r="3" fill="#34d399" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Right: State & History card -->
  <g transform="translate(930, 340)">
    <rect width="190" height="90" rx="10" fill="url(#cardGrad)" stroke="#f97316" stroke-width="1.5"/>
    <text x="95" y="22" text-anchor="middle" fill="#fb923c" font-family="monospace" font-size="11" font-weight="bold">State + History</text>
    <!-- State badges -->
    <rect x="14" y="36" width="50" height="18" rx="9" fill="#10b981" opacity="0.2" stroke="#34d399" stroke-width="0.8"/>
    <text x="39" y="49" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="8">Idle</text>
    <rect x="70" y="36" width="55" height="18" rx="9" fill="#06b6d4" opacity="0.2" stroke="#22d3ee" stroke-width="0.8"/>
    <text x="97" y="49" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="8">Listen</text>
    <rect x="131" y="36" width="48" height="18" rx="9" fill="#8b5cf6" opacity="0.2" stroke="#a78bfa" stroke-width="0.8"/>
    <text x="155" y="49" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="8">Think</text>
    <!-- History lines -->
    <rect x="14" y="62" width="120" height="6" rx="3" fill="#334155"/>
    <rect x="14" y="72" width="90" height="6" rx="3" fill="#334155" opacity="0.6"/>
  </g>

  <!-- Connecting lines from cards to center orb -->
  <g filter="url(#glow)">
    <line x1="270" y1="195" x2="555" y2="250" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
    <line x1="270" y1="385" x2="555" y2="275" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
    <line x1="930" y1="195" x2="645" y2="250" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
    <line x1="930" y1="385" x2="645" y2="275" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  </g>

  <!-- Center label -->
  <text x="600" y="340" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="12" opacity="0.7">IAiConversationService</text>

  <!-- Bottom: Platform badges -->
  <g transform="translate(340, 420)">
    <rect width="80" height="28" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="40" y="19" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">MAUI</text>
  </g>
  <g transform="translate(440, 420)">
    <rect width="80" height="28" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="40" y="19" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">Blazor</text>
  </g>
  <g transform="translate(540, 420)">
    <rect width="80" height="28" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="40" y="19" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">ASP.NET</text>
  </g>
  <g transform="translate(640, 420)">
    <rect width="80" height="28" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="40" y="19" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">OpenAI</text>
  </g>
  <g transform="translate(740, 420)">
    <rect width="80" height="28" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="40" y="19" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">Ollama</text>
  </g>

  <!-- Title -->
  <text x="600" y="520" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="28" font-weight="bold" filter="url(#glow)">Shiny.AiConversation</text>
  <text x="600" y="550" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="14">Text, Voice &amp; Wake Word — One Service, Every Platform</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3">
    <animate attributeName="fill" values="#8b5cf6;#06b6d4;#10b981;#f97316;#8b5cf6" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
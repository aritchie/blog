<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.3" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle glow orbs -->
  <circle cx="200" cy="300" r="180" fill="#8b5cf6" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="1000" cy="350" r="200" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Left side: Document Store / DB cylinder -->
  <g transform="translate(120, 180)">
    <!-- Cylinder body -->
    <rect x="0" y="20" width="140" height="120" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <ellipse cx="70" cy="20" rx="70" ry="20" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <ellipse cx="70" cy="140" rx="70" ry="20" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="0" y="20" width="140" height="120" fill="#1e293b" stroke="none"/>
    <line x1="0" y1="20" x2="0" y2="140" stroke="#334155" stroke-width="1.5"/>
    <line x1="140" y1="20" x2="140" y2="140" stroke="#334155" stroke-width="1.5"/>
    <ellipse cx="70" cy="20" rx="70" ry="20" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" opacity="0.8"/>

    <!-- DB label -->
    <text x="70" y="85" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="13" font-weight="bold">IDocument</text>
    <text x="70" y="103" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="13" font-weight="bold">Store</text>
  </g>

  <!-- JSON document cards floating near DB -->
  <g transform="translate(60, 370)" opacity="0.85">
    <rect width="120" height="60" rx="6" fill="url(#cardGrad)" stroke="#475569" stroke-width="1"/>
    <text x="10" y="18" fill="#94a3b8" font-family="monospace" font-size="10">{</text>
    <text x="18" y="32" fill="#22d3ee" font-family="monospace" font-size="10">"name"</text>
    <text x="68" y="32" fill="#94a3b8" font-family="monospace" font-size="10">: "Eve"</text>
    <text x="18" y="46" fill="#22d3ee" font-family="monospace" font-size="10">"age"</text>
    <text x="58" y="46" fill="#94a3b8" font-family="monospace" font-size="10">: 28</text>
    <text x="10" y="56" fill="#94a3b8" font-family="monospace" font-size="10">}</text>
  </g>

  <g transform="translate(200, 390)" opacity="0.7">
    <rect width="110" height="50" rx="6" fill="url(#cardGrad)" stroke="#475569" stroke-width="1"/>
    <text x="10" y="18" fill="#94a3b8" font-family="monospace" font-size="10">{</text>
    <text x="18" y="30" fill="#22d3ee" font-family="monospace" font-size="10">"status"</text>
    <text x="78" y="30" fill="#94a3b8" font-family="monospace" font-size="10">:</text>
    <text x="18" y="42" fill="#94a3b8" font-family="monospace" font-size="10">"Active"</text>
    <text x="10" y="48" fill="#94a3b8" font-family="monospace" font-size="10">}</text>
  </g>

  <!-- Center: Arrow flow -->
  <g filter="url(#glow)">
    <!-- Arrow line -->
    <line x1="310" y1="280" x2="440" y2="280" stroke="url(#arrowGrad)" stroke-width="3" stroke-dasharray="8,4"/>
    <!-- Arrowhead -->
    <polygon points="440,270 460,280 440,290" fill="#c084fc"/>

    <!-- Label above arrow -->
    <rect x="320" y="248" width="120" height="22" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
    <text x="380" y="263" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11" font-weight="bold">AI TOOLS</text>
  </g>

  <!-- Center: Code block -->
  <g transform="translate(470, 160)">
    <rect width="310" height="240" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect width="310" height="28" rx="8" fill="#1e293b"/>
    <rect y="20" width="310" height="8" fill="#1e293b"/>
    <circle cx="18" cy="14" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="36" cy="14" r="5" fill="#eab308" opacity="0.7"/>
    <circle cx="54" cy="14" r="5" fill="#22c55e" opacity="0.7"/>
    <text x="155" y="18" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Program.cs</text>

    <!-- Code lines -->
    <text x="16" y="52" fill="#c084fc" font-family="monospace" font-size="11">services</text>
    <text x="82" y="52" fill="#94a3b8" font-family="monospace" font-size="11">.</text>
    <text x="88" y="52" fill="#22d3ee" font-family="monospace" font-size="11">AddDocumentStoreAITools</text>
    <text x="16" y="68" fill="#94a3b8" font-family="monospace" font-size="11">(tools =></text>
    <text x="16" y="84" fill="#94a3b8" font-family="monospace" font-size="11">{</text>

    <text x="30" y="104" fill="#94a3b8" font-family="monospace" font-size="11">tools.</text>
    <text x="72" y="104" fill="#34d399" font-family="monospace" font-size="11">AddType</text>
    <text x="122" y="104" fill="#94a3b8" font-family="monospace" font-size="11">(</text>

    <text x="44" y="120" fill="#fbbf24" font-family="monospace" font-size="11">jsonCtx.Customer</text>
    <text x="182" y="120" fill="#94a3b8" font-family="monospace" font-size="11">,</text>

    <text x="44" y="136" fill="#94a3b8" font-family="monospace" font-size="11">capabilities:</text>
    <text x="44" y="152" fill="#f472b6" font-family="monospace" font-size="11">  DocumentAICapabilities</text>
    <text x="232" y="152" fill="#94a3b8" font-family="monospace" font-size="11">.</text>
    <text x="238" y="152" fill="#22d3ee" font-family="monospace" font-size="11">All</text>

    <text x="30" y="172" fill="#94a3b8" font-family="monospace" font-size="11">);</text>

    <text x="30" y="192" fill="#94a3b8" font-family="monospace" font-size="11">tools.</text>
    <text x="72" y="192" fill="#34d399" font-family="monospace" font-size="11">AddType</text>
    <text x="122" y="192" fill="#94a3b8" font-family="monospace" font-size="11">(</text>
    <text x="44" y="208" fill="#fbbf24" font-family="monospace" font-size="11">jsonCtx.Order</text>
    <text x="160" y="208" fill="#94a3b8" font-family="monospace" font-size="11">,</text>
    <text x="44" y="224" fill="#f472b6" font-family="monospace" font-size="11">ReadOnly</text>
    <text x="110" y="224" fill="#94a3b8" font-family="monospace" font-size="11">);</text>

    <text x="16" y="236" fill="#94a3b8" font-family="monospace" font-size="11">});</text>
  </g>

  <!-- Right side: AI / LLM brain -->
  <g transform="translate(850, 180)">
    <!-- Arrow from code to AI -->
    <line x1="-70" y1="100" x2="-20" y2="100" stroke="url(#arrowGrad)" stroke-width="3" stroke-dasharray="8,4" filter="url(#glow)"/>
    <polygon points="-20,90 0,100 -20,110" fill="#c084fc" filter="url(#glow)"/>

    <!-- AI circle -->
    <circle cx="80" cy="100" r="75" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
    <circle cx="80" cy="100" r="60" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5" opacity="0.8"/>

    <!-- Brain / neural net icon -->
    <circle cx="60" cy="82" r="8" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="100" cy="82" r="8" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="80" cy="65" r="8" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="60" cy="118" r="8" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="100" cy="118" r="8" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="80" cy="135" r="8" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <!-- Connections -->
    <line x1="66" y1="87" x2="74" y2="71" stroke="#64748b" stroke-width="0.8"/>
    <line x1="94" y1="87" x2="86" y2="71" stroke="#64748b" stroke-width="0.8"/>
    <line x1="66" y1="88" x2="94" y2="88" stroke="#64748b" stroke-width="0.8"/>
    <line x1="60" y1="90" x2="60" y2="110" stroke="#64748b" stroke-width="0.8"/>
    <line x1="100" y1="90" x2="100" y2="110" stroke="#64748b" stroke-width="0.8"/>
    <line x1="66" y1="113" x2="94" y2="113" stroke="#64748b" stroke-width="0.8"/>
    <line x1="66" y1="123" x2="74" y2="130" stroke="#64748b" stroke-width="0.8"/>
    <line x1="94" y1="123" x2="86" y2="130" stroke="#64748b" stroke-width="0.8"/>
    <line x1="94" y1="88" x2="66" y2="113" stroke="#64748b" stroke-width="0.6" opacity="0.5"/>
    <line x1="66" y1="88" x2="94" y2="113" stroke="#64748b" stroke-width="0.6" opacity="0.5"/>

    <!-- Label -->
    <text x="80" y="170" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="14" font-weight="bold">LLM Agent</text>
  </g>

  <!-- Right side: Tool badges -->
  <g transform="translate(870, 400)">
    <rect width="80" height="24" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10">query</text>
  </g>
  <g transform="translate(960, 400)">
    <rect width="80" height="24" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">insert</text>
  </g>
  <g transform="translate(1050, 400)">
    <rect width="80" height="24" rx="12" fill="#1e293b" stroke="#f472b6" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="10">delete</text>
  </g>
  <g transform="translate(870, 432)">
    <rect width="80" height="24" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10">count</text>
  </g>
  <g transform="translate(960, 432)">
    <rect width="80" height="24" rx="12" fill="#1e293b" stroke="#eab308" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">aggregate</text>
  </g>
  <g transform="translate(1050, 432)">
    <rect width="80" height="24" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10">update</text>
  </g>
  <g transform="translate(960, 464)">
    <rect width="80" height="24" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">get</text>
  </g>

  <!-- Title -->
  <text x="600" y="560" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="28" font-weight="bold" filter="url(#glow)">DocumentDb AI Tools</text>
  <text x="600" y="590" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="14">Give Your LLM a Database</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3">
    <animate attributeName="fill" values="#8b5cf6;#06b6d4;#f472b6;#8b5cf6" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
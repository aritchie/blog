<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="grainGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#6d28d9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.3" opacity="0.3"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="270" r="210" fill="#8b5cf6" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="1000" cy="300" r="220" fill="#06b6d4" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="600" cy="240" r="180" fill="#f472b6" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentPurple)"/>

  <!-- NEW chip top-right -->
  <g transform="translate(1070, 30)">
    <rect width="100" height="32" rx="16" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="50" y="22" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="14" font-weight="bold">NEW</text>
  </g>

  <!-- LEFT: Orleans cluster of dormant grains -->
  <g transform="translate(70, 150)">
    <!-- cluster boundary -->
    <circle cx="140" cy="140" r="135" fill="url(#grainGlow)"/>
    <circle cx="140" cy="140" r="135" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>

    <!-- mesh links -->
    <g stroke="#475569" stroke-width="1" opacity="0.35">
      <line x1="140" y1="140" x2="140" y2="55"/>
      <line x1="140" y1="140" x2="214" y2="97"/>
      <line x1="140" y1="140" x2="214" y2="183"/>
      <line x1="140" y1="140" x2="140" y2="225"/>
      <line x1="140" y1="140" x2="66" y2="183"/>
      <line x1="140" y1="140" x2="66" y2="97"/>
      <line x1="140" y1="55" x2="214" y2="97"/>
      <line x1="214" y1="97" x2="214" y2="183"/>
      <line x1="214" y1="183" x2="140" y2="225"/>
      <line x1="140" y1="225" x2="66" y2="183"/>
      <line x1="66" y1="183" x2="66" y2="97"/>
      <line x1="66" y1="97" x2="140" y2="55"/>
    </g>

    <!-- dormant grain nodes -->
    <g>
      <circle cx="140" cy="55"  r="15" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
      <circle cx="214" cy="97"  r="15" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
      <circle cx="214" cy="183" r="15" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
      <circle cx="140" cy="225" r="15" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
      <circle cx="66"  cy="183" r="15" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
      <circle cx="66"  cy="97"  r="15" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
      <!-- center grain: state persisted (lit) -->
      <circle cx="140" cy="140" r="19" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>
      <circle cx="140" cy="140" r="6" fill="#a78bfa"/>
    </g>

    <!-- sleep marker -->
    <text x="150" y="34" fill="#64748b" font-family="monospace" font-size="16" font-weight="bold">z</text>
    <text x="162" y="26" fill="#475569" font-family="monospace" font-size="12" font-weight="bold">z</text>

    <!-- cluster chip -->
    <g transform="translate(70, -22)">
      <rect width="140" height="24" rx="12" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
      <text x="70" y="16" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11" font-weight="bold">ORLEANS CLUSTER</text>
    </g>

    <text x="140" y="305" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="13">grains · not activated</text>
  </g>

  <!-- CENTER: code block — query without activation -->
  <g transform="translate(380, 140)">
    <rect width="420" height="300" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <!-- title bar -->
    <rect width="420" height="28" rx="8" fill="#1e293b"/>
    <rect y="20" width="420" height="8" fill="#1e293b"/>
    <circle cx="18" cy="14" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="36" cy="14" r="5" fill="#eab308" opacity="0.7"/>
    <circle cx="54" cy="14" r="5" fill="#22c55e" opacity="0.7"/>
    <text x="210" y="18" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">grain-state query</text>

    <!-- code lines -->
    <text x="16" y="60"  fill="#64748b" font-family="monospace" font-size="12">// no grain activated, no silo hop</text>
    <text x="16" y="84"  fill="#94a3b8" font-family="monospace" font-size="12">var carts = await readStore</text>
    <text x="30" y="106" fill="#94a3b8" font-family="monospace" font-size="12">.</text>
    <text x="36" y="106" fill="#22d3ee" font-family="monospace" font-size="12">Query</text>
    <text x="73" y="106" fill="#94a3b8" font-family="monospace" font-size="12">&lt;</text>
    <text x="80" y="106" fill="#34d399" font-family="monospace" font-size="12">GrainStateRecord</text>
    <text x="200" y="106" fill="#94a3b8" font-family="monospace" font-size="12">&gt;(</text>
    <text x="44" y="128" fill="#fbbf24" font-family="monospace" font-size="12">"json_extract(Data,</text>
    <text x="44" y="146" fill="#fbbf24" font-family="monospace" font-size="12">  '$.state.total') &gt; @min"</text>
    <text x="220" y="146" fill="#94a3b8" font-family="monospace" font-size="12">,</text>
    <text x="44" y="168" fill="#94a3b8" font-family="monospace" font-size="12">new { min = </text>
    <text x="128" y="168" fill="#c084fc" font-family="monospace" font-size="12">1000</text>
    <text x="160" y="168" fill="#94a3b8" font-family="monospace" font-size="12">});</text>

    <line x1="16" y1="188" x2="404" y2="188" stroke="#1e293b" stroke-width="1"/>

    <text x="16" y="214" fill="#64748b" font-family="monospace" font-size="12">// the whole stack, one store</text>
    <text x="16" y="236" fill="#94a3b8" font-family="monospace" font-size="12">siloBuilder</text>
    <text x="30" y="256" fill="#94a3b8" font-family="monospace" font-size="12">.</text>
    <text x="36" y="256" fill="#22d3ee" font-family="monospace" font-size="12">AddDocumentDbGrainStorage</text>
    <text x="248" y="256" fill="#94a3b8" font-family="monospace" font-size="12">(...)</text>
    <text x="30" y="276" fill="#94a3b8" font-family="monospace" font-size="12">.</text>
    <text x="36" y="276" fill="#f472b6" font-family="monospace" font-size="12">AddDocumentDbReminders</text>
    <text x="224" y="276" fill="#94a3b8" font-family="monospace" font-size="12">(...);</text>
  </g>

  <!-- query arrow: code -> store (bypasses the cluster entirely) -->
  <path d="M 800 250 C 845 250, 855 250, 895 250" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <g transform="translate(812, 222)">
    <rect width="74" height="20" rx="10" fill="#1e1b4b" stroke="#22d3ee" stroke-width="1"/>
    <text x="37" y="14" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10" font-weight="bold">query</text>
  </g>

  <!-- RIGHT: IDocumentStore cylinder with $.state JSON -->
  <g transform="translate(905, 170)">
    <ellipse cx="100" cy="20" rx="100" ry="24" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="0" y="20" width="200" height="150" fill="#1e293b" stroke="none"/>
    <line x1="0" y1="20" x2="0" y2="170" stroke="#334155" stroke-width="1.5"/>
    <line x1="200" y1="20" x2="200" y2="170" stroke="#334155" stroke-width="1.5"/>
    <ellipse cx="100" cy="170" rx="100" ry="24" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <ellipse cx="100" cy="20" rx="100" ry="24" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/>

    <ellipse cx="100" cy="70" rx="100" ry="24" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.5"/>
    <ellipse cx="100" cy="120" rx="100" ry="24" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.5"/>

    <text x="100" y="62"  text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="13" font-weight="bold">IDocumentStore</text>
    <text x="100" y="108" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">"$.state": &#123; … &#125;</text>
    <text x="100" y="150" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="11">queryable JSON</text>

    <text x="100" y="220" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="13">structured · not opaque</text>
  </g>

  <!-- Feature pills along the bottom -->
  <g transform="translate(90, 510)">
    <rect width="170" height="32" rx="16" fill="#1e293b" stroke="#06b6d4" stroke-width="1.2"/>
    <text x="85" y="21" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="12" font-weight="bold">Grain Storage</text>
  </g>
  <g transform="translate(278, 510)">
    <rect width="140" height="32" rx="16" fill="#1e293b" stroke="#10b981" stroke-width="1.2"/>
    <text x="70" y="21" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="12" font-weight="bold">Reminders</text>
  </g>
  <g transform="translate(436, 510)">
    <rect width="140" height="32" rx="16" fill="#1e293b" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="70" y="21" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="12" font-weight="bold">Clustering</text>
  </g>
  <g transform="translate(594, 510)">
    <rect width="190" height="32" rx="16" fill="#1e293b" stroke="#f472b6" stroke-width="1.2"/>
    <text x="95" y="21" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="12" font-weight="bold">Grain Directory</text>
  </g>
  <g transform="translate(802, 510)">
    <rect width="160" height="32" rx="16" fill="#1e293b" stroke="#eab308" stroke-width="1.2"/>
    <text x="80" y="21" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="12" font-weight="bold">Audit Trail</text>
  </g>

  <!-- Title -->
  <text x="600" y="585" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="28" font-weight="bold" filter="url(#glow)">Shiny.DocumentDb.Orleans</text>
  <text x="600" y="612" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="13">Query your grains without waking them up</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="centerGlow" cx="0.5" cy="0.5" r="0.5" fx="0.5" fy="0.5">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="150" r="180" fill="#7c3aed" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="1000" cy="480" r="200" fill="#2dd4bf" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="600" cy="315" r="250" fill="#7c3aed" opacity="0.05" filter="url(#blur1)"/>

  <!-- Grid pattern (subtle) -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Central hub (mediator contract) -->
  <circle cx="600" cy="290" r="70" fill="#1e1b4b" stroke="url(#glow1)" stroke-width="2.5"/>
  <circle cx="600" cy="290" r="70" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3" filter="url(#softGlow)"/>

  <!-- Contract icon: curly braces {} -->
  <text x="600" y="280" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="#c4b5fd">{ }</text>
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" letter-spacing="2">CONTRACT</text>

  <!-- Node 1: AI Tool (top-left) -->
  <g>
    <!-- Connection line -->
    <line x1="540" y1="245" x2="340" y2="160" stroke="url(#glow2)" stroke-width="2" stroke-dasharray="6 4" opacity="0.7"/>
    <circle cx="335" cy="155" r="8" fill="#f472b6" opacity="0.4" filter="url(#blur2)"/>

    <!-- Node -->
    <rect x="260" y="105" rx="16" ry="16" width="150" height="100" fill="#1e1b4b" stroke="#f472b6" stroke-width="2" opacity="0.9"/>
    <!-- Brain/AI icon -->
    <circle cx="335" cy="140" r="14" fill="none" stroke="#f9a8d4" stroke-width="1.5"/>
    <path d="M328 140 Q335 128 342 140 Q335 132 328 140Z" fill="#f9a8d4" opacity="0.6"/>
    <circle cx="331" cy="138" r="2" fill="#f9a8d4"/>
    <circle cx="339" cy="138" r="2" fill="#f9a8d4"/>
    <text x="335" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f9a8d4">AI Tool</text>
    <text x="335" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#f9a8d4" opacity="0.6">AIFunction</text>
  </g>

  <!-- Node 2: HTTP Client (top-right) -->
  <g>
    <!-- Connection line -->
    <line x1="660" y1="245" x2="860" y2="160" stroke="url(#glow3)" stroke-width="2" stroke-dasharray="6 4" opacity="0.7"/>
    <circle cx="865" cy="155" r="8" fill="#2dd4bf" opacity="0.4" filter="url(#blur2)"/>

    <!-- Node -->
    <rect x="790" y="105" rx="16" ry="16" width="150" height="100" fill="#1e1b4b" stroke="#2dd4bf" stroke-width="2" opacity="0.9"/>
    <!-- HTTP arrows icon -->
    <path d="M855 132 L870 140 L855 148" fill="none" stroke="#5eead4" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M875 132 L860 140 L875 148" fill="none" stroke="#5eead4" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <text x="865" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#5eead4">HTTP Client</text>
    <text x="865" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#5eead4" opacity="0.6">HttpClient</text>
  </g>

  <!-- Node 3: ASP.NET Endpoint (bottom) -->
  <g>
    <!-- Connection line -->
    <line x1="600" y1="360" x2="600" y2="430" stroke="url(#glow1)" stroke-width="2" stroke-dasharray="6 4" opacity="0.7"/>
    <circle cx="600" cy="435" r="8" fill="#818cf8" opacity="0.4" filter="url(#blur2)"/>

    <!-- Node -->
    <rect x="525" y="435" rx="16" ry="16" width="150" height="100" fill="#1e1b4b" stroke="#818cf8" stroke-width="2" opacity="0.9"/>
    <!-- API endpoint icon -->
    <path d="M585 467 L600 457 L615 467" fill="none" stroke="#a5b4fc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="600" y1="457" x2="600" y2="478" stroke="#a5b4fc" stroke-width="1.8" stroke-linecap="round"/>
    <text x="600" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a5b4fc">API Endpoint</text>
    <text x="600" y="517" text-anchor="middle" font-family="monospace" font-size="10" fill="#a5b4fc" opacity="0.6">MinimalAPI</text>
  </g>

  <!-- "Source Generated" badges on each connection -->
  <g transform="rotate(-25, 440, 200)">
    <rect x="390" y="188" rx="8" ry="8" width="100" height="20" fill="#7c3aed" opacity="0.25"/>
    <text x="440" y="202" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd" opacity="0.8">generated</text>
  </g>
  <g transform="rotate(25, 760, 200)">
    <rect x="710" y="188" rx="8" ry="8" width="100" height="20" fill="#7c3aed" opacity="0.25"/>
    <text x="760" y="202" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd" opacity="0.8">generated</text>
  </g>
  <rect x="550" y="390" rx="8" ry="8" width="100" height="20" fill="#7c3aed" opacity="0.25"/>
  <text x="600" y="404" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd" opacity="0.8">generated</text>

  <!-- Title text -->
  <text x="600" y="590" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0" letter-spacing="1">ONE CONTRACT, THREE TRANSPORTS</text>
  <text x="600" y="618" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="3">SHINY MEDIATOR AI TOOLING</text>

  <!-- Floating particles -->
  <circle cx="150" cy="400" r="2" fill="#7c3aed" opacity="0.4"/>
  <circle cx="1050" cy="250" r="2.5" fill="#2dd4bf" opacity="0.3"/>
  <circle cx="450" cy="80" r="1.5" fill="#f472b6" opacity="0.5"/>
  <circle cx="750" cy="550" r="2" fill="#818cf8" opacity="0.4"/>
  <circle cx="100" cy="550" r="1.5" fill="#2dd4bf" opacity="0.3"/>
  <circle cx="1100" cy="100" r="2" fill="#f472b6" opacity="0.4"/>
  <circle cx="900" cy="400" r="1.5" fill="#7c3aed" opacity="0.5"/>
  <circle cx="300" cy="500" r="2" fill="#818cf8" opacity="0.3"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.3" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orbs -->
  <circle cx="220" cy="280" r="190" fill="#10b981" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="1000" cy="330" r="200" fill="#8b5cf6" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Left: phone / health dashboard card -->
  <g transform="translate(110, 150)">
    <rect x="0" y="0" width="180" height="300" rx="22" fill="url(#cardGrad)" stroke="#334155" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="300" rx="22" fill="none" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    <rect x="60" y="12" width="60" height="8" rx="4" fill="#334155"/>

    <!-- heart -->
    <g transform="translate(90, 78)" filter="url(#glow)">
      <path d="M0 14 C0 4 -12 -2 -20 6 C-28 14 -16 26 0 38 C16 26 28 14 20 6 C12 -2 0 4 0 14 Z" fill="url(#heartGrad)"/>
    </g>
    <text x="90" y="138" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="20" font-weight="bold">72</text>
    <text x="90" y="156" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">bpm</text>

    <!-- ECG pulse line -->
    <polyline points="18,200 48,200 60,176 74,224 88,188 100,200 162,200"
      fill="none" stroke="#34d399" stroke-width="2.5" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- metric chips -->
    <g transform="translate(20, 230)">
      <rect width="64" height="22" rx="11" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
      <text x="32" y="15" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9">8,431 steps</text>
    </g>
    <g transform="translate(96, 230)">
      <rect width="64" height="22" rx="11" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
      <text x="32" y="15" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9">7h 12m</text>
    </g>
    <g transform="translate(58, 262)">
      <rect width="64" height="22" rx="11" fill="#1e293b" stroke="#eab308" stroke-width="1"/>
      <text x="32" y="15" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">540 kcal</text>
    </g>
  </g>

  <!-- platform tags under phone -->
  <g transform="translate(110, 470)">
    <rect width="86" height="26" rx="13" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="43" y="17" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="10">HealthKit</text>
  </g>
  <g transform="translate(204, 470)">
    <rect width="86" height="26" rx="13" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="43" y="17" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="9">HealthConnect</text>
  </g>

  <!-- Center: arrow + code block -->
  <g filter="url(#glow)">
    <line x1="300" y1="290" x2="440" y2="290" stroke="url(#arrowGrad)" stroke-width="3" stroke-dasharray="8,4"/>
    <polygon points="440,280 460,290 440,300" fill="#c084fc"/>
    <rect x="312" y="258" width="132" height="22" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
    <text x="378" y="273" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11" font-weight="bold">IHealthService</text>
  </g>

  <g transform="translate(470, 165)">
    <rect width="320" height="232" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <rect width="320" height="28" rx="8" fill="#1e293b"/>
    <rect y="20" width="320" height="8" fill="#1e293b"/>
    <circle cx="18" cy="14" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="36" cy="14" r="5" fill="#eab308" opacity="0.7"/>
    <circle cx="54" cy="14" r="5" fill="#22c55e" opacity="0.7"/>
    <text x="160" y="18" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">MauiProgram.cs</text>

    <text x="16" y="56" fill="#c084fc" font-family="monospace" font-size="11.5">services</text>
    <text x="80" y="56" fill="#94a3b8" font-family="monospace" font-size="11.5">.</text>
    <text x="86" y="56" fill="#22d3ee" font-family="monospace" font-size="11.5">AddHealthIntegration</text>
    <text x="262" y="56" fill="#94a3b8" font-family="monospace" font-size="11.5">();</text>

    <text x="16" y="84" fill="#c084fc" font-family="monospace" font-size="11.5">services</text>
    <text x="80" y="84" fill="#94a3b8" font-family="monospace" font-size="11.5">.</text>
    <text x="86" y="84" fill="#22d3ee" font-family="monospace" font-size="11.5">AddHealthAITools</text>
    <text x="226" y="84" fill="#94a3b8" font-family="monospace" font-size="11.5">(t => t</text>

    <text x="34" y="106" fill="#94a3b8" font-family="monospace" font-size="11.5">.</text>
    <text x="40" y="106" fill="#34d399" font-family="monospace" font-size="11.5">AddAllMetrics</text>
    <text x="146" y="106" fill="#94a3b8" font-family="monospace" font-size="11.5">()</text>

    <text x="34" y="128" fill="#94a3b8" font-family="monospace" font-size="11.5">.</text>
    <text x="40" y="128" fill="#34d399" font-family="monospace" font-size="11.5">AddWorkouts</text>
    <text x="130" y="128" fill="#94a3b8" font-family="monospace" font-size="11.5">()</text>

    <text x="34" y="150" fill="#94a3b8" font-family="monospace" font-size="11.5">.</text>
    <text x="40" y="150" fill="#34d399" font-family="monospace" font-size="11.5">AddNutrition</text>
    <text x="140" y="150" fill="#94a3b8" font-family="monospace" font-size="11.5">()</text>

    <text x="16" y="172" fill="#94a3b8" font-family="monospace" font-size="11.5">);</text>

    <text x="16" y="200" fill="#64748b" font-family="monospace" font-size="10.5">// 30+ metrics → LLM tools</text>
  </g>

  <!-- Right: arrow + LLM brain -->
  <g transform="translate(850, 185)">
    <line x1="-70" y1="100" x2="-20" y2="100" stroke="url(#arrowGrad)" stroke-width="3" stroke-dasharray="8,4" filter="url(#glow)"/>
    <polygon points="-20,90 0,100 -20,110" fill="#c084fc" filter="url(#glow)"/>

    <circle cx="80" cy="100" r="75" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
    <circle cx="80" cy="100" r="60" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5" opacity="0.8"/>

    <circle cx="60" cy="82" r="8" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="100" cy="82" r="8" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="80" cy="65" r="8" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="60" cy="118" r="8" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="100" cy="118" r="8" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="80" cy="135" r="8" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <line x1="66" y1="87" x2="74" y2="71" stroke="#64748b" stroke-width="0.8"/>
    <line x1="94" y1="87" x2="86" y2="71" stroke="#64748b" stroke-width="0.8"/>
    <line x1="66" y1="88" x2="94" y2="88" stroke="#64748b" stroke-width="0.8"/>
    <line x1="60" y1="90" x2="60" y2="110" stroke="#64748b" stroke-width="0.8"/>
    <line x1="100" y1="90" x2="100" y2="110" stroke="#64748b" stroke-width="0.8"/>
    <line x1="66" y1="113" x2="94" y2="113" stroke="#64748b" stroke-width="0.8"/>
    <line x1="94" y1="88" x2="66" y2="113" stroke="#64748b" stroke-width="0.6" opacity="0.5"/>
    <line x1="66" y1="88" x2="94" y2="113" stroke="#64748b" stroke-width="0.6" opacity="0.5"/>
    <text x="80" y="170" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="14" font-weight="bold">LLM Agent</text>
  </g>

  <!-- Right: tool badges -->
  <g transform="translate(866, 408)">
    <rect width="92" height="24" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
    <text x="46" y="16" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9">get_metric</text>
  </g>
  <g transform="translate(968, 408)">
    <rect width="92" height="24" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
    <text x="46" y="16" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="9">get_workouts</text>
  </g>
  <g transform="translate(866, 440)">
    <rect width="92" height="24" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
    <text x="46" y="16" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9">get_nutrition</text>
  </g>
  <g transform="translate(968, 440)">
    <rect width="92" height="24" rx="12" fill="#1e293b" stroke="#f472b6" stroke-width="1"/>
    <text x="46" y="16" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="9">write_metric</text>
  </g>

  <!-- Title -->
  <text x="600" y="556" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="30" font-weight="bold" filter="url(#glow)">Shiny Health 2.0</text>
  <text x="600" y="588" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="14">The Ultimate Cross-Platform Health Library</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3">
    <animate attributeName="fill" values="#10b981;#06b6d4;#8b5cf6;#f472b6;#10b981" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>

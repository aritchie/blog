<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dashboard shape -->
  <path d="M0,420 Q600,350 1200,420 L1200,630 L0,630 Z" fill="#0d1117" opacity="0.6"/>

  <!-- CarPlay screen -->
  <rect x="340" y="120" width="520" height="320" rx="20" fill="url(#carGrad)" stroke="#533483" stroke-width="2"/>
  <rect x="355" y="135" width="490" height="290" rx="12" fill="url(#screenGrad)"/>

  <!-- Screen content - grid buttons -->
  <rect x="380" y="165" width="105" height="90" rx="10" fill="#512BD4" opacity="0.8"/>
  <text x="432" y="215" text-anchor="middle" fill="white" font-family="system-ui" font-size="28">📱</text>
  <text x="432" y="245" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="bold">.NET MAUI</text>

  <rect x="500" y="165" width="105" height="90" rx="10" fill="#e94560" opacity="0.8"/>
  <text x="552" y="215" text-anchor="middle" fill="white" font-family="system-ui" font-size="28">🚗</text>
  <text x="552" y="245" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="bold">CarPlay</text>

  <rect x="620" y="165" width="105" height="90" rx="10" fill="#0f3460" opacity="0.8"/>
  <text x="672" y="215" text-anchor="middle" fill="white" font-family="system-ui" font-size="28">🤖</text>
  <text x="672" y="245" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="bold">Android Auto</text>

  <rect x="740" y="165" width="80" height="90" rx="10" fill="#1a8a4a" opacity="0.8"/>
  <text x="780" y="215" text-anchor="middle" fill="white" font-family="system-ui" font-size="28">📍</text>
  <text x="780" y="245" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="bold">GPS</text>

  <!-- .NET bot icon -->
  <circle cx="432" y="350" r="25" fill="#512BD4" opacity="0.6"/>

  <!-- Title text on screen -->
  <text x="600" y="155" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="12">CarPlay &amp; Android Auto</text>

  <!-- Bottom bar -->
  <rect x="380" y="380" width="440" height="30" rx="6" fill="#161b22"/>
  <text x="600" y="400" text-anchor="middle" fill="#512BD4" font-family="system-ui" font-size="12" font-weight="bold">.NET MAUI × CarPlay × Android Auto</text>

  <!-- Title -->
  <text x="600" y="510" text-anchor="middle" fill="#e6edf3" font-family="system-ui" font-size="36" font-weight="bold">CarPlay &amp; Android Auto with .NET MAUI</text>
  <text x="600" y="550" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="18">Extending your app beyond the phone screen</text>

  <!-- Decorative dots -->
  <circle cx="150" cy="200" r="3" fill="#512BD4" opacity="0.4"/>
  <circle cx="180" cy="180" r="2" fill="#e94560" opacity="0.3"/>
  <circle cx="1050" cy="220" r="3" fill="#533483" opacity="0.4"/>
  <circle cx="1020" cy="190" r="2" fill="#512BD4" opacity="0.3"/>
</svg>

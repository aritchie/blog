<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="accentPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="vectorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.3" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orbs -->
  <circle cx="180" cy="280" r="200" fill="#8b5cf6" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="1020" cy="320" r="220" fill="#06b6d4" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="600" cy="240" r="180" fill="#f472b6" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentPink)"/>

  <!-- Version chip top-right -->
  <g transform="translate(1060, 30)">
    <rect width="110" height="32" rx="16" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="55" y="22" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="14" font-weight="bold">v6.0</text>
  </g>

  <!-- Left side: Document Store cylinder -->
  <g transform="translate(80, 150)">
    <ellipse cx="80" cy="20" rx="80" ry="20" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="0" y="20" width="160" height="140" fill="#1e293b" stroke="none"/>
    <line x1="0" y1="20" x2="0" y2="160" stroke="#334155" stroke-width="1.5"/>
    <line x1="160" y1="20" x2="160" y2="160" stroke="#334155" stroke-width="1.5"/>
    <ellipse cx="80" cy="160" rx="80" ry="20" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <ellipse cx="80" cy="20" rx="80" ry="20" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9"/>

    <!-- Disk dividers -->
    <ellipse cx="80" cy="60" rx="80" ry="20" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.5"/>
    <ellipse cx="80" cy="100" rx="80" ry="20" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.5"/>

    <!-- DB label -->
    <text x="80" y="135" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="14" font-weight="bold">IDocument</text>
    <text x="80" y="152" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="14" font-weight="bold">Store</text>
  </g>

  <!-- Provider badges below cylinder -->
  <g transform="translate(40, 360)">
    <rect width="70" height="20" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
    <text x="35" y="14" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9">SQLite</text>
  </g>
  <g transform="translate(120, 360)">
    <rect width="70" height="20" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
    <text x="35" y="14" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="9">Postgres</text>
  </g>
  <g transform="translate(200, 360)">
    <rect width="70" height="20" rx="10" fill="#1e293b" stroke="#f472b6" stroke-width="1"/>
    <text x="35" y="14" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="9">Cosmos</text>
  </g>
  <g transform="translate(40, 386)">
    <rect width="70" height="20" rx="10" fill="#1e293b" stroke="#eab308" stroke-width="1"/>
    <text x="35" y="14" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">MongoDB</text>
  </g>
  <g transform="translate(120, 386)">
    <rect width="70" height="20" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
    <text x="35" y="14" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="9">SQL Srv</text>
  </g>
  <g transform="translate(200, 386)">
    <rect width="70" height="20" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
    <text x="35" y="14" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9">DuckDB</text>
  </g>

  <!-- Center: Code block showing v6 features -->
  <g transform="translate(330, 140)">
    <rect width="430" height="320" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect width="430" height="28" rx="8" fill="#1e293b"/>
    <rect y="20" width="430" height="8" fill="#1e293b"/>
    <circle cx="18" cy="14" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="36" cy="14" r="5" fill="#eab308" opacity="0.7"/>
    <circle cx="54" cy="14" r="5" fill="#22c55e" opacity="0.7"/>
    <text x="215" y="18" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">DocumentDb v6</text>

    <!-- Code lines -->
    <text x="16" y="56" fill="#64748b" font-family="monospace" font-size="11">// vector search</text>
    <text x="16" y="74" fill="#94a3b8" font-family="monospace" font-size="11">opts.</text>
    <text x="48" y="74" fill="#22d3ee" font-family="monospace" font-size="11">MapVectorProperty</text>
    <text x="170" y="74" fill="#94a3b8" font-family="monospace" font-size="11">&lt;Doc&gt;(</text>
    <text x="30" y="92" fill="#fbbf24" font-family="monospace" font-size="11">d =&gt; d.Embedding</text>
    <text x="158" y="92" fill="#94a3b8" font-family="monospace" font-size="11">, </text>
    <text x="170" y="92" fill="#c084fc" font-family="monospace" font-size="11">1536</text>
    <text x="200" y="92" fill="#94a3b8" font-family="monospace" font-size="11">);</text>

    <text x="16" y="120" fill="#64748b" font-family="monospace" font-size="11">// global query filters</text>
    <text x="16" y="138" fill="#94a3b8" font-family="monospace" font-size="11">opts.</text>
    <text x="48" y="138" fill="#22d3ee" font-family="monospace" font-size="11">AddQueryFilter</text>
    <text x="153" y="138" fill="#94a3b8" font-family="monospace" font-size="11">&lt;User&gt;(</text>
    <text x="30" y="156" fill="#fbbf24" font-family="monospace" font-size="11">u =&gt; !u.IsDeleted</text>
    <text x="166" y="156" fill="#94a3b8" font-family="monospace" font-size="11">);</text>

    <text x="16" y="184" fill="#64748b" font-family="monospace" font-size="11">// composite JSON index</text>
    <text x="16" y="202" fill="#94a3b8" font-family="monospace" font-size="11">await store.</text>
    <text x="98" y="202" fill="#22d3ee" font-family="monospace" font-size="11">CreateIndexAsync</text>
    <text x="216" y="202" fill="#94a3b8" font-family="monospace" font-size="11">(</text>
    <text x="30" y="220" fill="#fbbf24" font-family="monospace" font-size="11">ctx.User,</text>
    <text x="30" y="238" fill="#fbbf24" font-family="monospace" font-size="11">u =&gt; u.LastName, u =&gt; u.FirstName</text>
    <text x="278" y="238" fill="#94a3b8" font-family="monospace" font-size="11">);</text>

    <text x="16" y="266" fill="#64748b" font-family="monospace" font-size="11">// nearest vectors</text>
    <text x="16" y="284" fill="#94a3b8" font-family="monospace" font-size="11">var hits = await store.</text>
    <text x="186" y="284" fill="#34d399" font-family="monospace" font-size="11">Query</text>
    <text x="223" y="284" fill="#94a3b8" font-family="monospace" font-size="11">&lt;Doc&gt;()</text>
    <text x="30" y="302" fill="#94a3b8" font-family="monospace" font-size="11">.</text>
    <text x="36" y="302" fill="#f472b6" font-family="monospace" font-size="11">NearestVectors</text>
    <text x="146" y="302" fill="#94a3b8" font-family="monospace" font-size="11">(query, k: </text>
    <text x="225" y="302" fill="#c084fc" font-family="monospace" font-size="11">10</text>
    <text x="240" y="302" fill="#94a3b8" font-family="monospace" font-size="11">);</text>
  </g>

  <!-- Right side: Vector space visualisation -->
  <g transform="translate(820, 150)">
    <!-- glow background -->
    <circle cx="160" cy="160" r="160" fill="url(#vectorGlow)"/>

    <!-- Orbit circles -->
    <circle cx="160" cy="160" r="140" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.4"/>
    <circle cx="160" cy="160" r="100" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.4"/>
    <circle cx="160" cy="160" r="60" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.4"/>

    <!-- Query vector center -->
    <circle cx="160" cy="160" r="10" fill="#f472b6" filter="url(#glow)"/>
    <circle cx="160" cy="160" r="6" fill="#fff"/>

    <!-- Nearest neighbour vectors (inner orbit) -->
    <line x1="160" y1="160" x2="200" y2="120" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.7"/>
    <circle cx="200" cy="120" r="7" fill="#22d3ee" filter="url(#glow)"/>

    <line x1="160" y1="160" x2="120" y2="195" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.7"/>
    <circle cx="120" cy="195" r="7" fill="#22d3ee" filter="url(#glow)"/>

    <line x1="160" y1="160" x2="200" y2="195" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.7"/>
    <circle cx="200" cy="195" r="7" fill="#22d3ee" filter="url(#glow)"/>

    <!-- Middle orbit -->
    <circle cx="240" cy="100" r="6" fill="#34d399" opacity="0.85"/>
    <circle cx="80" cy="130" r="6" fill="#34d399" opacity="0.85"/>
    <circle cx="100" cy="230" r="6" fill="#34d399" opacity="0.85"/>
    <circle cx="230" cy="220" r="6" fill="#34d399" opacity="0.85"/>

    <!-- Far orbit -->
    <circle cx="290" cy="160" r="5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="40" cy="160" r="5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="160" cy="30" r="5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="160" cy="290" r="5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="270" cy="70" r="5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="60" cy="80" r="5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="70" cy="260" r="5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="260" cy="250" r="5" fill="#a78bfa" opacity="0.7"/>

    <!-- k=10 label -->
    <g transform="translate(232, 90)">
      <rect width="58" height="20" rx="10" fill="#1e1b4b" stroke="#f472b6" stroke-width="1"/>
      <text x="29" y="14" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="11" font-weight="bold">k = 10</text>
    </g>

    <!-- Label below -->
    <text x="160" y="335" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="13" font-weight="bold">ANN / Vector Search</text>
  </g>

  <!-- Feature pills along the bottom -->
  <g transform="translate(95, 510)">
    <rect width="160" height="32" rx="16" fill="#1e293b" stroke="#06b6d4" stroke-width="1.2"/>
    <text x="80" y="21" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="12" font-weight="bold">Vector Search</text>
  </g>
  <g transform="translate(275, 510)">
    <rect width="170" height="32" rx="16" fill="#1e293b" stroke="#10b981" stroke-width="1.2"/>
    <text x="85" y="21" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="12" font-weight="bold">Query Filters</text>
  </g>
  <g transform="translate(465, 510)">
    <rect width="185" height="32" rx="16" fill="#1e293b" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="92" y="21" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="12" font-weight="bold">Composite Indexes</text>
  </g>
  <g transform="translate(670, 510)">
    <rect width="180" height="32" rx="16" fill="#1e293b" stroke="#f472b6" stroke-width="1.2"/>
    <text x="90" y="21" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="12" font-weight="bold">Pooled SQL</text>
  </g>
  <g transform="translate(870, 510)">
    <rect width="225" height="32" rx="16" fill="#1e293b" stroke="#eab308" stroke-width="1.2"/>
    <text x="112" y="21" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="12" font-weight="bold">Change Monitoring</text>
  </g>

  <!-- Title -->
  <text x="600" y="585" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="28" font-weight="bold" filter="url(#glow)">Shiny.DocumentDb v6</text>
  <text x="600" y="612" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="13">One API · Nine Providers · Now with Vectors</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="netGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.3" opacity="0.3"/>
    </pattern>
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="280" r="210" fill="#06b6d4" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="1000" cy="300" r="220" fill="#8b5cf6" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="600" cy="250" r="180" fill="#10b981" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentCyan)"/>

  <!-- offline/online chip top-right -->
  <g transform="translate(1030, 30)">
    <rect width="140" height="32" rx="16" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="22" cy="16" r="5" fill="#34d399"/>
    <text x="80" y="22" text-anchor="middle" fill="#a7f3d0" font-family="monospace" font-size="13" font-weight="bold">offline-first</text>
  </g>

  <!-- LEFT: device with outbox queue -->
  <g transform="translate(95, 150)">
    <!-- phone frame -->
    <rect x="0" y="0" width="200" height="300" rx="22" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="12" y="14" width="176" height="272" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect x="78" y="4" width="44" height="7" rx="3.5" fill="#334155"/>

    <text x="100" y="42" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12" font-weight="bold">OUTBOX</text>

    <!-- queued ops -->
    <g transform="translate(26, 56)">
      <rect width="148" height="34" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1.2"/>
      <rect x="10" y="9" width="40" height="16" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
      <text x="30" y="21" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10" font-weight="bold">POST</text>
      <text x="62" y="22" fill="#94a3b8" font-family="monospace" font-size="11">Todo #1</text>
    </g>
    <g transform="translate(26, 98)">
      <rect width="148" height="34" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.2"/>
      <rect x="10" y="9" width="34" height="16" rx="8" fill="#0f172a" stroke="#c4b5fd" stroke-width="1"/>
      <text x="27" y="21" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="10" font-weight="bold">PUT</text>
      <text x="56" y="22" fill="#94a3b8" font-family="monospace" font-size="11">Todo #2</text>
    </g>
    <g transform="translate(26, 140)">
      <rect width="148" height="34" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="1.2"/>
      <rect x="10" y="9" width="34" height="16" rx="8" fill="#0f172a" stroke="#f472b6" stroke-width="1"/>
      <text x="27" y="21" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="10" font-weight="bold">DEL</text>
      <text x="56" y="22" fill="#94a3b8" font-family="monospace" font-size="11">Todo #3</text>
    </g>

    <!-- persisted badge -->
    <g transform="translate(26, 188)">
      <rect width="148" height="26" rx="13" fill="#0f172a" stroke="#475569" stroke-width="1"/>
      <text x="74" y="17" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">persisted · survives kill</text>
    </g>

    <!-- inbox label -->
    <text x="100" y="244" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12" font-weight="bold">INBOX</text>
    <g transform="translate(26, 252)">
      <rect width="148" height="24" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.2"/>
      <text x="74" y="16" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">cursor deltas ↓</text>
    </g>
  </g>

  <!-- CENTER: bidirectional transport arrows -->
  <g transform="translate(310, 0)">
    <circle cx="295" cy="300" r="150" fill="url(#netGlow)"/>

    <!-- push (up/out) arrow -->
    <path d="M 5 250 C 150 220, 440 220, 585 250" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-dasharray="6,5" marker-end="url(#arrowUp)"/>
    <g transform="translate(232, 198)">
      <rect width="130" height="26" rx="13" fill="#1e1b4b" stroke="#22d3ee" stroke-width="1"/>
      <text x="65" y="18" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="11" font-weight="bold">push outbox</text>
    </g>

    <!-- pull (down/in) arrow -->
    <path d="M 585 350 C 440 380, 150 380, 5 350" fill="none" stroke="#34d399" stroke-width="2.5" stroke-dasharray="6,5" marker-end="url(#arrowDown)"/>
    <g transform="translate(228, 372)">
      <rect width="138" height="26" rx="13" fill="#1e1b4b" stroke="#34d399" stroke-width="1"/>
      <text x="69" y="18" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="11" font-weight="bold">pull deltas</text>
    </g>

    <!-- transport tier label -->
    <text x="295" y="300" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="12" font-weight="bold">NSURLSession · ForegroundSvc · HttpClient</text>
    <text x="295" y="320" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">drain on reconnect</text>
  </g>

  <!-- RIGHT: server cylinder -->
  <g transform="translate(905, 175)">
    <ellipse cx="100" cy="20" rx="100" ry="24" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="0" y="20" width="200" height="150" fill="#1e293b" stroke="none"/>
    <line x1="0" y1="20" x2="0" y2="170" stroke="#334155" stroke-width="1.5"/>
    <line x1="200" y1="20" x2="200" y2="170" stroke="#334155" stroke-width="1.5"/>
    <ellipse cx="100" cy="170" rx="100" ry="24" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <ellipse cx="100" cy="20" rx="100" ry="24" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5" opacity="0.9"/>
    <ellipse cx="100" cy="70" rx="100" ry="24" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.5"/>
    <ellipse cx="100" cy="120" rx="100" ry="24" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.5"/>

    <text x="100" y="62"  text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="13" font-weight="bold">REST API</text>
    <text x="100" y="108" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">POST / PUT / DELETE</text>
    <text x="100" y="150" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="11">GET ?cursor=…</text>

    <text x="100" y="220" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="13">your existing backend</text>
  </g>

  <!-- Feature pills along the bottom -->
  <g transform="translate(110, 505)">
    <rect width="180" height="32" rx="16" fill="#1e293b" stroke="#06b6d4" stroke-width="1.2"/>
    <text x="90" y="21" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="12" font-weight="bold">Persistent Outbox</text>
  </g>
  <g transform="translate(308, 505)">
    <rect width="160" height="32" rx="16" fill="#1e293b" stroke="#10b981" stroke-width="1.2"/>
    <text x="80" y="21" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="12" font-weight="bold">Cursor Inbox</text>
  </g>
  <g transform="translate(486, 505)">
    <rect width="170" height="32" rx="16" fill="#1e293b" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="85" y="21" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="12" font-weight="bold">Rides the Job</text>
  </g>
  <g transform="translate(674, 505)">
    <rect width="200" height="32" rx="16" fill="#1e293b" stroke="#f472b6" stroke-width="1.2"/>
    <text x="100" y="21" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="12" font-weight="bold">Survives App Kill</text>
  </g>
  <g transform="translate(892, 505)">
    <rect width="200" height="32" rx="16" fill="#1e293b" stroke="#eab308" stroke-width="1.2"/>
    <text x="100" y="21" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="12" font-weight="bold">Conflict Handling</text>
  </g>

  <!-- Title -->
  <text x="600" y="582" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="28" font-weight="bold" filter="url(#glow)">Shiny.Data.Sync</text>
  <text x="600" y="610" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="13">Background record sync · built on Jobs &amp; HTTP Transfers</text>
</svg>
